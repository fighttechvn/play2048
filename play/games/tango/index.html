<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<script>
/* iOS 12 / old WebKit have no Pointer Events — the games drive all input through
   pointerdown/move/up (+ setPointerCapture). Bridge touch (and old-desktop mouse)
   into synthetic pointer events so swiping/drawing works. No-op on modern engines. */
(function () {
  if (window.PointerEvent) return;
  var EP = window.Element && Element.prototype;
  if (EP && !EP.setPointerCapture) {
    EP.setPointerCapture = function () {};
    EP.releasePointerCapture = function () {};
    EP.hasPointerCapture = function () { return false; };
  }
  function mk(type, x, y, id, ptype) {
    var e;
    try { e = new MouseEvent(type, { bubbles: true, cancelable: true, view: window, clientX: x, clientY: y }); }
    catch (_) { e = document.createEvent("MouseEvents"); e.initMouseEvent(type, true, true, window, 0, 0, 0, x, y, false, false, false, false, 0, null); }
    e.pointerId = id; e.pointerType = ptype; e.isPrimary = true;
    e.pressure = type === "pointerup" || type === "pointercancel" ? 0 : 0.5;
    e.width = 1; e.height = 1;
    return e;
  }
  // --- touch → pointer (move/up go to the start target, mimicking pointer capture) ---
  var startTarget = null, touchActive = false, lastTouch = 0;
  function relay(type, touch, target) {
    var ev = mk(type, touch.clientX, touch.clientY, (touch.identifier || 0) + 1, "touch");
    return target.dispatchEvent(ev); // false if a handler called preventDefault()
  }
  document.addEventListener("touchstart", function (e) {
    touchActive = true; lastTouch = e.timeStamp || 0; startTarget = e.target;
    if (!relay("pointerdown", e.changedTouches[0], startTarget)) e.preventDefault();
  }, { passive: false });
  document.addEventListener("touchmove", function (e) {
    lastTouch = e.timeStamp || 0;
    if (!relay("pointermove", e.changedTouches[0], startTarget || e.target)) e.preventDefault();
  }, { passive: false });
  function end(type) {
    return function (e) {
      touchActive = false; lastTouch = e.timeStamp || 0;
      relay(type, e.changedTouches[0], startTarget || e.target); startTarget = null;
    };
  }
  document.addEventListener("touchend", end("pointerup"), { passive: false });
  document.addEventListener("touchcancel", end("pointercancel"), { passive: false });
  // --- mouse → pointer (old desktop); skip the synthetic mouse burst after a touch ---
  function fromMouse(type) {
    return function (e) {
      if (touchActive || (e.timeStamp || 0) - lastTouch < 700) return;
      e.target.dispatchEvent(mk(type, e.clientX, e.clientY, 1, "mouse"));
    };
  }
  document.addEventListener("mousedown", fromMouse("pointerdown"), true);
  document.addEventListener("mousemove", fromMouse("pointermove"), true);
  document.addEventListener("mouseup", fromMouse("pointerup"), true);
})();
</script>

<style>
  :root{--bg:#f2f0eb;--card:#fff;--ink:#1a1a1a;--grid:#cfcabd;--given:#ece9e0;--bd:#d0d0d0;--btn:#fff;--sun:#f3a712;--sund:#d98c00;--moon:#3f6fd1;--bad:#e2483a}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);overscroll-behavior:none}
  #wrap{max-width:560px;margin:0 auto;padding:calc(16px + var(--saa-top, env(safe-area-inset-top, 0px))) calc(16px + var(--saa-right, env(safe-area-inset-right, 0px))) calc(16px + var(--saa-bottom, env(safe-area-inset-bottom, 0px))) calc(16px + var(--saa-left, env(safe-area-inset-left, 0px)));display:flex;flex-direction:column;gap:14px;min-height:100%}

  .btn:disabled{opacity:.45}
  .help{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px 18px;font-size:14.5px;color:#555;line-height:1.5}
  .win{position:fixed;top:0;right:0;bottom:0;left:0;display:none;place-items:center;background:rgba(0,0,0,.5);z-index:9}

  /* First-run guided tutorial.
     The overlay is pass-through by default so an interactive step (the guided
     trace, and any future touch/swipe step) lets the gesture reach the board.
     Only non-interactive steps add .block to capture input; the card and its
     buttons always stay clickable. */
  #tut{position:fixed;top:0;right:0;bottom:0;left:0;z-index:20;display:none;pointer-events:none}
  #tut.on{display:block}
  #tut.block{pointer-events:auto}

  #tutHole{position:fixed;border-radius:14px;box-shadow:0 0 0 9999px rgba(0,0,0,.42);transition:left .22s ease,top .22s ease,width .22s ease,height .22s ease;pointer-events:none}
  /* Translucent "glass" tooltip — the board stays visible through it. */
  #tutCard{position:fixed;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:300px;pointer-events:auto;background:rgba(255,255,255,.66);-webkit-backdrop-filter:blur(16px) saturate(1.5);backdrop-filter:blur(16px) saturate(1.5);border:1px solid rgba(255,255,255,.55);border-radius:16px;padding:18px 20px;box-shadow:0 12px 40px rgba(0,0,0,.22)}
  #tutCard::after{content:"";position:absolute;left:50%;width:16px;height:16px;background:rgba(255,255,255,.66);transform:translateX(-50%) rotate(45deg);display:none}
  #tutCard.below::after{display:block;top:-8px}
  #tutCard.above::after{display:block;bottom:-8px}
  #tutCard h3{margin:0 0 7px;font-size:18px;font-weight:700;color:#1a1a1a}
  #tutCard p{margin:0;font-size:14.5px;line-height:1.5;color:#2c2c2c}
  #tutCard .row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px}
  #tutSkip{background:none;border:0;color:#9a9a9a;font-size:13px;font-weight:600;cursor:pointer;padding:6px 2px}
  #tutNext{background:#1a1a1a;color:#fff;border:0;border-radius:999px;padding:11px 24px;font-weight:700;font-size:15px;cursor:pointer}
@supports not (inset:0){#wrap>*+*{margin-top:14px}.top>*+*{margin-left:8px}.btns>*+*{margin-left:12px}}

<div id="wrap">
  <div class="top"><span class="pill" id="lvl">Tango · Level 1</span><span class="pill" id="status">Tap to fill</span></div>

  <div class="help"><b>How to play.</b> Fill every cell with a <b>Sun</b> or a <b>Moon</b>. Each row and column needs three of each, no more than two alike may touch, <b>=</b> links equal symbols and <b>×</b> links opposite ones. Tap a cell to cycle sun → moon → empty.</div>

<script>
/* Localized "how to play" — locale comes from the hub via ?lang=, else device. */
(function(){
  function pick(){var p=new URLSearchParams(location.search).get("lang");var raw=p||localStorage.getItem("gobrain.locale")||localStorage.getItem("CapacitorStorage.gobrain.locale")||navigator.language||"en";var c=String(raw).toLowerCase().split("-")[0];return ["en","vi","ko","zh","ja","ar"].indexOf(c)>=0?c:"en";}
  var T={
    en:"<b>How to play.</b> Fill every cell with a <b>Sun</b> or a <b>Moon</b>. Each row and column needs three of each, no more than two alike may touch, <b>=</b> links equal symbols and <b>×</b> links opposite ones. Tap a cell to cycle sun → moon → empty.",
    vi:"<b>Cách chơi.</b> Điền mỗi ô bằng <b>Mặt trời</b> hoặc <b>Mặt trăng</b>. Mỗi hàng và cột cần ba cái mỗi loại, không quá hai cái giống nhau cạnh nhau, <b>=</b> nối hai ký hiệu giống nhau và <b>×</b> nối hai ký hiệu khác nhau. Chạm vào ô để đổi mặt trời → mặt trăng → trống.",
    ko:"<b>플레이 방법.</b> 모든 칸을 <b>해</b> 또는 <b>달</b>로 채우세요. 각 행과 열에는 각각 세 개가 필요하고, 같은 것이 셋 이상 붙을 수 없으며, <b>=</b>는 같은 기호를, <b>×</b>는 반대 기호를 연결합니다. 칸을 누르면 해 → 달 → 빈칸 순으로 바뀝니다.",
    zh:"<b>玩法。</b> 用<b>太阳</b>或<b>月亮</b>填满每个格子。每行每列各需三个，相同符号相邻不得超过两个，<b>=</b>连接相同符号，<b>×</b>连接相反符号。点按格子在太阳 → 月亮 → 空之间切换。",
    ja:"<b>遊び方。</b> すべてのマスを<b>太陽</b>か<b>月</b>で埋めます。各行・各列にそれぞれ3つずつ必要で、同じものは3つ以上隣接できません。<b>=</b>は同じ記号、<b>×</b>は反対の記号をつなぎます。マスをタップすると太陽 → 月 → 空に切り替わります。",
    ar:"<b>طريقة اللعب.</b> املأ كل خانة بـ<b>شمس</b> أو <b>قمر</b>. يحتاج كل صف وعمود إلى ثلاثة من كل نوع، ولا يجوز تجاور أكثر من اثنين متماثلين، <b>=</b> تربط الرمزين المتماثلين و<b>×</b> تربط المتعاكسين. انقر على خانة للتبديل: شمس → قمر → فارغ."
  };
  var L=pick(),el=document.querySelector(".help");
  if(el){el.innerHTML=T[L]||T.en; if(L==="ar")el.dir="rtl";}
})();
</script>

<script>
const KEY="tango.level";
const TUTKEY="tango.tutorialSeen";
const TUT_ON=(function(){var p=new URLSearchParams(location.search).get("tut");return !(p==="0"||p==="off"||p==="false");})(); // feature flag: hub passes ?tut=0 to disable
// Locale for the tutorial — same source order as the "how to play" help above.
const LANG=(function(){var p=new URLSearchParams(location.search).get("lang");var raw=p||localStorage.getItem("gobrain.locale")||localStorage.getItem("CapacitorStorage.gobrain.locale")||navigator.language||"en";var c=String(raw).toLowerCase().split("-")[0];return ["en","vi","ko","zh","ja","ar"].indexOf(c)>=0?c:"en";})();
// ── Leaderboard reporter (Go Brain) — see games/zip for notes; paste + change GAME ──
const GBLB=(function(){
  var GAME='tango', t0=0;
  function base(){ try{var o=localStorage.getItem('gobrain.api.base'); if(o) return o.replace(/\/$/,'');}catch(e){}
    return (function(){try{var C=window.Capacitor||(window.parent&&window.parent.Capacitor);if(C&&typeof C.isNativePlatform==='function')return C.isNativePlatform();}catch(e){}return /^capacitor:|^ionic:/.test(location.protocol);})()?'https://gobrain.fighttech.vn/api/v1':'/api/v1'; }
  function token(){ try{return localStorage.getItem('CapacitorStorage.gobrain.player.token')||localStorage.getItem('gobrain.player.token');}catch(e){return null;} }
  function apiKey(){ try{return localStorage.getItem('gobrain.api.key')||'gobrain-dev-client-key';}catch(e){return 'gobrain-dev-client-key';} }
  function emit(name,params){ try{ if(window.parent&&window.parent!==window){ params=params||{}; params.game_id=GAME; window.parent.postMessage({__gb:1,name:name,params:params},'*'); } }catch(e){} }
  return {
    start:function(){ t0=Date.now(); emit('level_start',{}); },
    report:function(level){ var ms=t0?(Date.now()-t0):0; emit('level_complete',{level:level,duration_ms:ms});
      var tok=token(); if(!tok||!t0) return; t0=0;
      try{ fetch(base()+'/scores',{method:'POST',headers:{'content-type':'application/json','x-api-key':apiKey(),'authorization':'Bearer '+tok},
        body:JSON.stringify({gameId:GAME,level:level,durationMs:ms})}).catch(function(){}); }catch(e){} }
  };
})();
let DATA=null, lvl=0, L=null, g=null, givenSet=null, history=[], cell=0, ox=0, oy=0;
let tutActive=false, tutStep=0, tutRAF=0, tutT=0, tutTarget=null; // first-run guided tutorial
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const $=id=>document.getElementById(id);
const ckey=(r,c)=>r+','+c;
const ekey=(r,c,r2,c2)=>(r<r2||(r===r2&&c<c2))?`${r},${c},${r2},${c2}`:`${r2},${c2},${r},${c}`;

fetch('./levels.json').then(r=>r.json()).then(d=>{DATA=d; lvl=Math.min(+(localStorage.getItem(KEY)||0), d.levels.length-1); load(lvl);});

function load(i){
  L=DATA.levels[i]; history=[];
  g=Array.from({length:L.size},()=>Array(L.size).fill(-1));
  givenSet=new Set();
  for(const c of L.given){ g[c.r][c.c]=c.v; givenSet.add(ckey(c.r,c.c)); }
  L.eqSet=new Set(L.equals.map(e=>ekey(e.r,e.c,e.r2,e.c2)));
  L.neSet=new Set(L.crosses.map(e=>ekey(e.r,e.c,e.r2,e.c2)));
  layout(); draw(); $('lvl').textContent='Tango · Level '+(i+1); upd();
  maybeStartTut(); GBLB.start();
}
function layout(){
  const wrap=document.getElementById('wrap');
  const W=Math.min(wrap.clientWidth-60, 480);
  cell=Math.floor(W/L.size); ox=Math.floor((W-cell*L.size)/2); oy=ox;
  const px=cell*L.size+2*ox;
  cv.width=px*devicePixelRatio; cv.height=px*devicePixelRatio; cv.style.width=px+'px'; cv.style.height=px+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
function getCss(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

function violations(){
  const bad=new Set(); const S=L.size;
  // triples
  for(let r=0;r<S;r++)for(let c=0;c<S;c++){const v=g[r][c]; if(v===-1)continue;
    if(c>=2&&g[r][c-1]===v&&g[r][c-2]===v){bad.add(ckey(r,c));bad.add(ckey(r,c-1));bad.add(ckey(r,c-2));}
    if(r>=2&&g[r-1][c]===v&&g[r-2][c]===v){bad.add(ckey(r,c));bad.add(ckey(r-1,c));bad.add(ckey(r-2,c));}
  }
  // counts (>3 of a symbol in a row/col)
  for(let r=0;r<S;r++){const cnt=[0,0];for(let c=0;c<S;c++)if(g[r][c]!==-1)cnt[g[r][c]]++;
    for(const v of [0,1])if(cnt[v]>S/2)for(let c=0;c<S;c++)if(g[r][c]===v)bad.add(ckey(r,c));}
  for(let c=0;c<S;c++){const cnt=[0,0];for(let r=0;r<S;r++)if(g[r][c]!==-1)cnt[g[r][c]]++;
    for(const v of [0,1])if(cnt[v]>S/2)for(let r=0;r<S;r++)if(g[r][c]===v)bad.add(ckey(r,c));}
  // sign clues
  for(const e of L.equals){const a=g[e.r][e.c],b=g[e.r2][e.c2];if(a!==-1&&b!==-1&&a!==b){bad.add(ckey(e.r,e.c));bad.add(ckey(e.r2,e.c2));}}
  for(const e of L.crosses){const a=g[e.r][e.c],b=g[e.r2][e.c2];if(a!==-1&&b!==-1&&a===b){bad.add(ckey(e.r,e.c));bad.add(ckey(e.r2,e.c2));}}
  return bad;
}

function drawSun(x,y,rad){
  ctx.fillStyle=getCss('--sun'); ctx.beginPath(); ctx.arc(x,y,rad,0,7); ctx.fill();
  ctx.strokeStyle=getCss('--sund'); ctx.lineWidth=Math.max(2,rad*0.10); ctx.beginPath(); ctx.arc(x,y,rad,0,7); ctx.stroke();
}
function drawMoon(x,y,rad){
  ctx.fillStyle=getCss('--moon');
  ctx.beginPath();
  ctx.arc(x,y,rad,0,Math.PI*2,false);                    // outer
  ctx.arc(x+rad*0.55,y-rad*0.18,rad*0.92,0,Math.PI*2,true); // carve (reverse winding)
  ctx.fill('evenodd');
}

function draw(){
  const S=L.size; ctx.clearRect(0,0,cv.width,cv.height);
  const bad=violations();
  // cells
  for(let r=0;r<S;r++)for(let c=0;c<S;c++){
    const x=ox+c*cell,y=oy+r*cell;
    ctx.fillStyle=givenSet.has(ckey(r,c))?getCss('--given'):'#fff';
    ctx.fillRect(x,y,cell,cell);
    if(bad.has(ckey(r,c))){ctx.fillStyle='rgba(226,72,58,.16)';ctx.fillRect(x,y,cell,cell);}
    const v=g[r][c]; const cx=x+cell/2, cy=y+cell/2, rad=cell*0.30;
    if(v===0)drawSun(cx,cy,rad); else if(v===1)drawMoon(cx,cy,rad);
  }
  // grid lines
  ctx.strokeStyle=getCss('--grid'); ctx.lineWidth=1;
  for(let r=0;r<=S;r++){ctx.beginPath();ctx.moveTo(ox,oy+r*cell);ctx.lineTo(ox+cell*S,oy+r*cell);ctx.stroke();}
  for(let c=0;c<=S;c++){ctx.beginPath();ctx.moveTo(ox+c*cell,oy);ctx.lineTo(ox+c*cell,oy+cell*S);ctx.stroke();}
  // outer border
  ctx.strokeStyle='#9a9486'; ctx.lineWidth=2; ctx.strokeRect(ox,oy,cell*S,cell*S);
  // sign clues on edges
  for(const e of L.equals) drawSign(e,'=');
  for(const e of L.crosses) drawSign(e,'x');
  if(tutActive && STEPS[tutStep] && STEPS[tutStep].key==='act') drawTutHint();
}
function drawSign(e,t){
  const x1=ox+e.c*cell+cell/2, y1=oy+e.r*cell+cell/2;
  const x2=ox+e.c2*cell+cell/2, y2=oy+e.r2*cell+cell/2;
  const mx=(x1+x2)/2, my=(y1+y2)/2, s=cell*0.13;
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(mx,my,s+5,0,7); ctx.fill();
  ctx.strokeStyle='#4a4439'; ctx.lineWidth=Math.max(2.4,cell*0.035); ctx.lineCap='round';
  if(t==='='){
    ctx.beginPath();ctx.moveTo(mx-s,my-s*0.5);ctx.lineTo(mx+s,my-s*0.5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mx-s,my+s*0.5);ctx.lineTo(mx+s,my+s*0.5);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(mx-s,my-s);ctx.lineTo(mx+s,my+s);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mx+s,my-s);ctx.lineTo(mx-s,my+s);ctx.stroke();
  }
}

function cellAt(ev){
  const rect=cv.getBoundingClientRect();
  const c=Math.floor((ev.clientX-rect.left-ox)/cell), r=Math.floor((ev.clientY-rect.top-oy)/cell);
  if(r<0||c<0||r>=L.size||c>=L.size)return null; return [r,c];
}
let downCell=null;
cv.addEventListener('pointerdown',ev=>{ev.preventDefault();downCell=cellAt(ev);});
cv.addEventListener('pointerup',ev=>{ev.preventDefault();const cl=cellAt(ev);
  if(cl&&downCell&&cl[0]===downCell[0]&&cl[1]===downCell[1])tap(cl[0],cl[1]);downCell=null;});
// iOS in-app webviews (Messenger/Facebook/Instagram) ignore touch-action:none and
// pointer-event preventDefault for scroll suppression — a vertical swipe on the
// board still scrolls/bounces the page. A non-passive touchmove preventDefault is
// the only reliable cross-webview way to keep a swipe on the board from scrolling.
cv.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

function tap(r,c){
  if(givenSet.has(ckey(r,c)))return;
  history.push({r,c,v:g[r][c]});
  g[r][c]=g[r][c]===-1?0:g[r][c]===0?1:-1;
  draw();upd();checkWin();
  if(tutActive && STEPS[tutStep] && STEPS[tutStep].key==='act' && tutTarget && g[tutTarget[0]][tutTarget[1]]===L.solution[tutTarget[0]][tutTarget[1]]) nextTut();
}
function upd(){
  $('undo').disabled=history.length===0;
  let filled=0;const S=L.size;for(let r=0;r<S;r++)for(let c=0;c<S;c++)if(g[r][c]!==-1)filled++;
  const bad=violations();
  $('status').textContent=bad.size?`${bad.size/1|0} conflict${bad.size>1?'s':''}`:`Filled ${filled}/${S*S}`;
}
function checkWin(){
  const S=L.size;for(let r=0;r<S;r++)for(let c=0;c<S;c++)if(g[r][c]===-1)return;
  if(violations().size)return;
  GBLB.report(lvl+1); $('winmsg').textContent='Level '+(lvl+1)+' of '+DATA.count+' complete.';
  $('wino').style.display='grid';
}
$('undo').onclick=()=>{const m=history.pop();if(!m)return;g[m.r][m.c]=m.v;draw();upd();};
$('reset').onclick=()=>{for(let r=0;r<L.size;r++)for(let c=0;c<L.size;c++)if(!givenSet.has(ckey(r,c)))g[r][c]=-1;history=[];draw();upd();};
$('hint').onclick=()=>{
  const S=L.size;const opts=[];
  for(let r=0;r<S;r++)for(let c=0;c<S;c++)if(g[r][c]!==L.solution[r][c]&&!givenSet.has(ckey(r,c)))opts.push([r,c]);
  if(!opts.length)return;const [r,c]=opts[(Math.random()*opts.length)|0];
  history.push({r,c,v:g[r][c]});g[r][c]=L.solution[r][c];draw();upd();checkWin();
};
$('next').onclick=()=>{$('wino').style.display='none';lvl=Math.min(lvl+1,DATA.levels.length-1);localStorage.setItem(KEY,lvl);load(lvl);};
addEventListener('resize',()=>{if(L){layout();draw();if(tutActive)renderTut();}});

/* ── First-run guided tutorial ─────────────────────────────────────────────
   On the very first visit (only on Level 1) we walk the player through the
   goal, then have them physically tap the highlighted cell. Shown once; the
   "seen" flag lives in localStorage. */
const TUT_T={
  en:{w_t:"Welcome to Tango",w_b:"Fill every cell with a Sun or a Moon.",start:"Start",
      s_t:"The clues",s_b:"Each row and column needs three Suns and three Moons. = links equal symbols, × links opposite ones.",next:"Next",
      t_t:"Tap to fill",t_b:"Tap the glowing cell: once for a Sun, again for a Moon.",
      f_t:"You've got it! 🎉",f_b:"Fill the whole grid with no rule broken to solve it.",play:"Play",skip:"Skip"},
  vi:{w_t:"Chào mừng đến với Tango",w_b:"Điền mỗi ô bằng Mặt trời hoặc Mặt trăng.",start:"Bắt đầu",
      s_t:"Các gợi ý",s_b:"Mỗi hàng và cột cần ba Mặt trời và ba Mặt trăng. = nối hai ký hiệu giống nhau, × nối hai ký hiệu khác nhau.",next:"Tiếp",
      t_t:"Chạm để điền",t_b:"Chạm vào ô đang sáng: một lần ra Mặt trời, lần nữa ra Mặt trăng.",
      f_t:"Bạn làm được rồi! 🎉",f_b:"Điền kín lưới mà không phạm luật để giải.",play:"Chơi",skip:"Bỏ qua"},
  ko:{w_t:"Tango에 오신 것을 환영합니다",w_b:"모든 칸을 해 또는 달로 채우세요.",start:"시작",
      s_t:"단서",s_b:"각 행과 열에는 해 세 개와 달 세 개가 필요합니다. =는 같은 기호, ×는 반대 기호를 연결합니다.",next:"다음",
      t_t:"탭하여 채우기",t_b:"빛나는 칸을 탭하세요: 한 번은 해, 다시 한 번은 달.",
      f_t:"잘하셨어요! 🎉",f_b:"규칙을 어기지 않고 그리드를 전부 채우면 클리어!",play:"플레이",skip:"건너뛰기"},
  zh:{w_t:"欢迎来到 Tango",w_b:"用太阳或月亮填满每个格子。",start:"开始",
      s_t:"线索",s_b:"每行每列需要三个太阳和三个月亮。= 连接相同符号，× 连接相反符号。",next:"下一步",
      t_t:"点击填写",t_b:"点击发光的格子：一次填太阳，再次填月亮。",
      f_t:"你学会了！🎉",f_b:"不违反任何规则地填满整个网格即可解题。",play:"开始玩",skip:"跳过"},
  ja:{w_t:"Tango へようこそ",w_b:"すべてのマスを太陽か月で埋めます。",start:"スタート",
      s_t:"ヒント",s_b:"各行・各列に太陽3つと月3つが必要です。= は同じ記号、× は反対の記号をつなぎます。",next:"次へ",
      t_t:"タップして埋める",t_b:"光っているマスをタップ：1回で太陽、もう1回で月。",
      f_t:"できました！🎉",f_b:"ルールを破らずにグリッドをすべて埋めれば解決！",play:"プレイ",skip:"スキップ"},
  ar:{w_t:"مرحباً بك في Tango",w_b:"املأ كل خانة بشمس أو قمر.",start:"ابدأ",
      s_t:"الأدلة",s_b:"يحتاج كل صف وعمود إلى ثلاثة شموس وثلاثة أقمار. = تربط الرموز المتماثلة، × تربط المتعاكسة.",next:"التالي",
      t_t:"اضغط للملء",t_b:"اضغط على الخانة المضيئة: مرة للشمس، ومرة أخرى للقمر.",
      f_t:"أحسنت! 🎉",f_b:"املأ الشبكة كاملة دون كسر أي قاعدة لحل اللغز.",play:"العب",skip:"تخطّي"}
};
const M=TUT_T[LANG]||TUT_T.en;
const STEPS=[
  {key:"welcome",target:null,                title:M.w_t,body:M.w_b,btn:M.start},
  {key:"explain", target:()=>cv,       pad:6, title:M.s_t,body:M.s_b,btn:M.next},
  {key:"act",     target:()=>cv,       pad:6, interactive:true, title:M.t_t,body:M.t_b},
  {key:"finish",  target:null,                title:M.f_t,body:M.f_b,btn:M.play}
];

function maybeStartTut(){
  if(!TUT_ON)return;                       // feature flag off
  if(localStorage.getItem(TUTKEY))return;
  if(lvl!==0||tutActive)return;
  tutTarget=null;
  for(let r=0;r<L.size&&!tutTarget;r++)for(let c=0;c<L.size;c++){ if(g[r][c]===-1&&!givenSet.has(ckey(r,c))){tutTarget=[r,c];break;} }
  if(!tutTarget)return;
  tutActive=true; tutStep=0; renderTut();
}
function setHole(rect,pad){
  pad=pad||8; const h=$('tutHole');
  $('tutBg').style.display='none'; h.style.display='block';
  h.style.left=(rect.left-pad)+'px'; h.style.top=(rect.top-pad)+'px';
  h.style.width=(rect.width+pad*2)+'px'; h.style.height=(rect.height+pad*2)+'px';
}
function placeCard(rect){
  const card=$('tutCard'); card.classList.remove('above','below');
  if(!rect){ card.style.top='50%'; card.style.transform='translate(-50%,-50%)'; return; }
  card.style.transform='translateX(-50%)';
  const ch=card.offsetHeight, below=rect.top<innerHeight*0.5;
  let top=below?rect.bottom+16:rect.top-16-ch;
  card.classList.add(below?'below':'above');
  card.style.top=Math.max(12,Math.min(top,innerHeight-ch-12))+'px';
}
function renderTut(){
  const s=STEPS[tutStep], tut=$('tut');
  tut.classList.add('on'); tut.classList.toggle('block',!s.interactive);
  if(LANG==='ar')$('tutCard').dir='rtl';
  $('tutTitle').textContent=s.title; $('tutBody').textContent=s.body;
  $('tutSkip').textContent=M.skip;
  const next=$('tutNext');
  if(s.interactive){ next.style.display='none'; }
  else { next.style.display='inline-block'; next.textContent=s.btn; }
  const tgt=s.target&&s.target();
  if(tgt){ const r=tgt.getBoundingClientRect(); setHole(r,s.pad); placeCard(r); }
  else { $('tutHole').style.display='none'; $('tutBg').style.display='block'; placeCard(null); }
  if(s.interactive && !tutRAF) tutRAF=requestAnimationFrame(tutAnimate);
}
function nextTut(){ tutStep++; if(tutStep>=STEPS.length){ endTut(); return; } renderTut(); }
function endTut(){
  tutActive=false; if(tutRAF){cancelAnimationFrame(tutRAF);tutRAF=0;}
  localStorage.setItem(TUTKEY,'1'); $('tut').classList.remove('on'); draw();
}
$('tutNext').onclick=nextTut;
$('tutSkip').onclick=endTut;

function tutAnimate(ts){
  tutT=ts||0;
  if(!(tutActive && STEPS[tutStep] && STEPS[tutStep].key==='act')){ tutRAF=0; return; }
  draw(); tutRAF=requestAnimationFrame(tutAnimate);
}
function drawTutHint(){
  if(!tutTarget)return;
  const [r,c]=tutTarget, t=tutT/1000, col=getCss('--moon')||'#3f6fd1';
  const x=ox+c*cell, y=oy+r*cell;
  const pulse=0.4+0.45*(0.5+0.5*Math.sin(t*3.4));
  ctx.save(); ctx.globalAlpha=pulse; ctx.strokeStyle=col; ctx.lineWidth=Math.max(3,cell*0.07);
  ctx.strokeRect(x+3,y+3,cell-6,cell-6); ctx.restore();
  const fp=0.5+0.5*Math.sin(t*3.4);
  ctx.save(); ctx.globalAlpha=0.9; ctx.fillStyle=col;
  ctx.beginPath(); ctx.arc(x+cell/2,y+cell/2,cell*(0.10+0.05*fp),0,7); ctx.fill();
  ctx.lineWidth=3; ctx.strokeStyle='#fff'; ctx.stroke(); ctx.restore();
}
